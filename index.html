
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniClinic Pro - ระบบบริหารจัดการคลินิกอัจฉริยะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
        }
        @media print {
            /* Standard reset for print */
            @page {
                margin: 0;
                size: auto;
            }
            html, body {
                height: auto;
                background-color: white !important;
                margin: 0;
                padding: 0;
            }
            
            /* Hide everything by default */
            body * {
                visibility: hidden;
            }
            
            /* Show ONLY the printable sections */
            #printable-doc, #printable-doc *, 
            #drug-label, #drug-label *, 
            #appointment-card, #appointment-card *,
            #tube-labels-container, #tube-labels-container * {
                visibility: visible !important;
            }
            
            /* Force printable sections to the top and ensure backgrounds are printed */
            #printable-doc, #drug-label, #appointment-card, #tube-labels-container {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                background: white !important;
                box-shadow: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            #appointment-card {
                width: 210mm !important;
                height: 148mm !important;
                z-index: 9999 !important;
                display: block !important;
            }

            #printable-doc {
                width: 100% !important;
                padding: 1.5cm !important;
                z-index: 9998 !important;
                display: block !important;
            }

            #tube-labels-container {
                width: 50mm !important;
                background-color: transparent !important;
                padding: 0 !important;
                border: none !important;
                z-index: 9996 !important;
            }

            #tube-labels-container div {
                margin: 0 !important;
                page-break-after: always !important;
            }

            #drug-label {
                width: 8cm !important;
                height: 5cm !important;
                padding: 5mm !important;
                z-index: 9997 !important;
                display: block !important;
            }

            /* Extra safety to hide UI elements */
            .print\:hidden, button, nav, aside, .no-print {
                display: none !important;
                visibility: hidden !important;
            }
        }
    </style>
